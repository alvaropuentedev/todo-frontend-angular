
<p-toast key="mobileToast" position="top-center" [styleClass]="'z-50 mobile-toast'"></p-toast>
<p-toast key="desktopToast" position="top-right" [styleClass]="'z-50'" [style]="{ width: '40vh' }"></p-toast>

@for (item of items; track item.id) {
  <div class="card flex justify-center items-center mt-4">
    <p-card styleClass="customCard" class="z-10 w-max border border-gray-100 rounded" id="card-{{ item.id }}">
        <div class="flex justify-between items-center">
          <a (click)="editItem(item)" (keyup.enter)="editItem(item)" tabindex="0" class="text-slate-800 font-medium cursor-pointer"
                  style="overflow-wrap: anywhere; word-break: break-word;"> {{ item.description }} 
          </a>
          <div class="relative flex items-center justify-center">
              <button class="z-10 bg-white p-2 rounded-full"
                (click)="mobileView ? null : deleteItem(item.id, item.description)"
                (mousedown)="mobileView && startPress(item.id, item.description)"
                (mouseup)="mobileView && cancelPress(item.id)"
                (mouseleave)="mobileView && cancelPress(item.id)"
                (touchstart)="mobileView && startPress(item.id, item.description)"
                (touchend)="mobileView && cancelPress(item.id)"
                (touchcancel)="mobileView && cancelPress(item.id)">
                <svg class="w-8 h-8 p-2 rounded-lg bg-red-300 text-slate-600 dark:text-white" aria-hidden="true" 
                  xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                  <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                        d="M5 7h14m-9 3v8m4-8v8M10 3h4a1 1 0 0 1 1 1v3H9V4a1 1 0 0 1 1-1ZM6 7h12v13a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V7Z"/>
                </svg>
              </button>
          </div>
        </div>      
    </p-card>
  </div>
}
<!-- EDIT ITEM DIALOG -->
<div class="card flex justify-center">
  <p-dialog 
    header="Edit Item"
    [modal]="true" 
    [(visible)]="visible" 
    [style]="{ width: '22rem' }" 
    (onHide)="onDialogCancel()"
    [dismissableMask]="true"
  >
    <p-floatlabel variant="on" class="mt-1 mb-5">
      <label for="editInput" class="block text-sm text-gray-600 mb-2">Update item information.</label>
      <textarea 
        #editInput 
        type="text" 
        rows="5"cols="30" pTextarea autoResize="true"
        id="editInput" 
        class="w-full p-2 border border-gray-300 rounded-md font-medium text-gray-800 focus:outline-none focus:ring-2 focus:ring-green-400"
        [formControl]="itemControl" 
        pInputText 
        (keydown.enter)="updateItemDescription()" 
        autofocus
      >
      </textarea >
    </p-floatlabel>
    <div class="flex justify-end gap-2 mt-6">
      <p-button 
        label="Cancel" 
        severity="secondary" 
        (click)="visible = false"
        styleClass="p-button-outlined"
      ></p-button>
      <p-button 
        label="Update" 
        (click)="updateItemDescription()"
      ></p-button>
    </div>
  </p-dialog>
</div>
